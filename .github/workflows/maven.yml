name: Java CI with Maven and PostgreSQL

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # This spins up a temporary PostgreSQL Docker container inside the GitHub Runner
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: inventory_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        # This makes GitHub wait until PostgreSQL is fully booted before running your tests
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    # Step 1: Clone your repository into the GitHub Runner
    - name: Checkout repository
      uses: actions/checkout@v4

    # Step 2: Set up Java Environment (Adjust java-version if you use 11, 21, etc.)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    # Step 3: Run the Maven build and tests
    - name: Build and Test with Maven
      working-directory: ./main
      env:
        # These inject the variables directly into your Spring Boot application.yml
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: password
      run: mvn clean install