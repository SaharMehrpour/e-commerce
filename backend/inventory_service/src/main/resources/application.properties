spring.application.name=inventory-service

server.port=8081

# PostgreSQL (Inventory DB)
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/inventory_db}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=inventory-service-group
spring.kafka.consumer.auto-offset-reset=earliest

# Topics
app.kafka.topics.inventory-reserved=inventory-reserved
app.kafka.topics.inventory-restored=inventory-restored
app.kafka.topics.inventory-failed=inventory-failed
app.kafka.topics.inventory-updated=inventory-updated
app.kafka.topics.order-created=order-created
app.kafka.topics.order-cancelled=order-cancelled
app.kafka.topics.order-updated=order-updated

# Actuator / Prometheus
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always