spring.application.name=inventory-service-test

# H2 database for JPA tests
spring.datasource.url=jdbc:h2:mem:inventory_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Kafka (disabled for unit tests unless testcontainers used)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.listener.auto-startup=false
spring.kafka.consumer.group-id=inventory-test-group

# Topics
app.kafka.topics.inventory-reserved=inventory-reserved
app.kafka.topics.inventory-restored=inventory-restored
app.kafka.topics.inventory-failed=inventory-failed
app.kafka.topics.inventory-updated=inventory-updated
app.kafka.topics.order-created=order-created
app.kafka.topics.order-cancelled=order-cancelled
app.kafka.topics.order-updated=order-updated

# No external service dependency
inventory.service.url=http://localhost:8081