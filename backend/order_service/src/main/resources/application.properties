spring.application.name=order-service

server.port=8080

# MongoDB (Order DB)
spring.mongodb.uri=${SPRING_MONGODB_URI:mongodb://localhost:27017/order_db}

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=order-service-group
spring.kafka.consumer.auto-offset-reset=earliest

# Topics
app.kafka.topics.order-created=order-created
app.kafka.topics.order-cancelled=order-cancelled
app.kafka.topics.order-updated=order-updated

# Inventory service communication
inventory.service.url=${INVENTORY_SERVICE_URL:http://localhost:8081}

# Actuator / Prometheus
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always