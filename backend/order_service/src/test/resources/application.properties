spring.application.name=order-service-test

# MongoDB (in-memory or test container override)
spring.data.mongodb.uri=mongodb://localhost:27017/order_test

# Redis (can be mocked or local)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=none

# Kafka (disabled for unit tests unless using testcontainers)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.listener.auto-startup=false
spring.kafka.consumer.group-id=order-test-group

# Order topics only
app.kafka.topics.order-created=order-created
app.kafka.topics.order-cancelled=order-cancelled
app.kafka.topics.order-updated=order-updated

# External dependency mock
inventory.service.url=http://localhost:8081

# JPA not used here (important cleanup)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration