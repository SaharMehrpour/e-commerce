spring.datasource.url=jdbc:h2:mem:ecommerce_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.listener.auto-startup=false
spring.kafka.consumer.group-id=ecommerce-test-group
app.kafka.topics.order-created=order-created
app.kafka.topics.order-cancelled=order-cancelled
app.kafka.topics.order-updated=order-updated
app.kafka.topics.inventory-reserved=inventory-reserved
app.kafka.topics.inventory-restored=inventory-restored
app.kafka.topics.inventory-failed=inventory-failed
app.kafka.topics.inventory-updated=inventory-updated
inventory.service.url=http://localhost:8080/inventory
